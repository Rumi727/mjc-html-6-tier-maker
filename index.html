<!-- 팀원 아이템 시작 (주의: id 값은 팀원마다 고유하게 변경하세요) -->
<div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)" id="battlegrounds">
    <img src="battlegrounds.png" alt="배틀그라운드">
    <div class="battlegrounds">배틀그라운드</div>
</div>

<div class="item" draggable="true" ondragstart="drag(event)" onmouseover="showPreview(this)" id="valorant">
    <img src="valorant.jpg" alt="발로란트">
    <div class="valorant.jpg">발로란트</div>
</div>
<!-- 팀원 아이템 끝 -->
